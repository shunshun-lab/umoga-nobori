name: Deploy Slides & Archives

on:
  push:
    branches:
      - main
    paths:
      - "_slide/**"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "slides-deploy"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Upload _slide directory as artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _slide

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

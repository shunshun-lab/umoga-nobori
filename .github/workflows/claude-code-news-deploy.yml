name: Claude Code News - Deploy

on:
  push:
    branches: [main]
    paths:
      - "_slide/claude-code-news/**"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages-_slide/claude-code-news"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: _slide/claude-code-news
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: _slide/claude-code-news/package-lock.json

      - name: Install
        run: npm ci

      - name: Build
        env:
          NEXT_PUBLIC_BASE_PATH: "/_slide/claude-code-news"
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _slide/claude-code-news/out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

name: Claude Code News - Collect

on:
  schedule:
    # 毎日 0:00 UTC = 9:00 JST
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: claude-code-news
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: claude-code-news/package-lock.json

      - name: Install
        run: npm ci

      - name: Collect news
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run collect

      - name: Commit and push if changed
        id: commit
        run: |
          cd ..
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add claude-code-news/content/
          if git diff --cached --quiet; then
            echo "No new content to commit"
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            git commit -m "chore: collect claude code news $(date -u +%Y-%m-%d)"
            git push
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Deploy to Vercel
        if: steps.commit.outputs.changed == 'true'
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: team_PLjy8VMhWhIDVgvGJrkiABvl
          VERCEL_PROJECT_ID: prj_jwrNul7pcY78fYbt785xyBkVp0jp
        run: |
          npm i -g vercel
          vercel pull --yes --token=$VERCEL_TOKEN
          vercel build --prod --token=$VERCEL_TOKEN
          vercel deploy --prebuilt --prod --token=$VERCEL_TOKEN
